# For Supabase CLI local development
project_id = "debtnote"

[api]
enabled = true

[db]
major_version = 15

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]

[storage]
enabled = true

# GoTrue Send Email Hook signs with the hook secret (not a JWT).
# JWT verification at the gateway must stay off or OTP emails fail for all tenants.
[functions.auth-send-email]
verify_jwt = false

# Lender notify is invoked with service role from Next.js / cron.
[functions.debt-note-notify-lender]
verify_jwt = false

[functions.debt-note-process-reminder-queue]
verify_jwt = false

[functions.debt-note-delete-account]
verify_jwt = false
