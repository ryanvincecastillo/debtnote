name: debtnote_mobile
description: Debt Note App — personal utang/pautang collection
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  supabase_flutter: ^2.8.1
  flutter_dotenv: ^5.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/debtnote_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/debtnote_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#000000"
  image: assets/debtnote.png
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#000000"
    image: assets/debtnote.png

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
    - assets/debtnote.png
    - assets/debtnote_icon.png
